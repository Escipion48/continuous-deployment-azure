# He hecho el workflow basándome en la plantilla base de inicio proporcionada por GitHub
name: Workflow 4

on:
  schedule:
    - cron: '0 0 * * *'  # Creo que a las 2 am es buena hora
  workflow_dispatch:
    inputs:
      name:
        description: 'Person to greet'
        default: 'World'
        required: true
        type: string

jobs:
  tests:
    name: Test [${{ matrix.os }} · ${{ matrix.browser }}]
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            browser: chrome
          - os: windows-latest
            browser: chrome
          - os: macos-latest
            browser: chrome

          - os: ubuntu-latest
            browser: firefox
          - os: windows-latest
            browser: firefox
          - os: macos-latest
            browser: firefox

          - os: windows-latest
            browser: edge

          - os: macos-latest
            browser: safari

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Chrome
        if: matrix.browser == 'chrome'
        uses: browser-actions/setup-chrome@v1

      - name: Set up Firefox
        if: matrix.browser == 'firefox'
        uses: browser-actions/setup-firefox@v1

      - name: Set up Edge driver
        if: matrix.browser == 'edge'
        uses: browser-actions/setup-edge@v1

      - name: Enable Safari driver
        if: matrix.browser == 'safari'
        run: sudo safaridriver --enable

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Run Tests
        run: mvn test -Dtest="**/board/*Test" -DfailIfNoTests=false -Dbrowser=${{ matrix.browser }}

  build:
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Generate tag
        run: echo "tag=nightly-$(date +'%Y%m%d.%H%M%S')" > $GITHUB_OUTPUT
        id: timestamp

      - name: Generate Docker image
        run: mvn spring-boot:build-image -DskipTests
          -Dspring-boot.build-image.imageName=${{ secrets.DOCKERHUB_USERNAME }}/posts:${{steps.timestamp.outputs.tag}}

      - name: Log in to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }} #Cambiar a DOCKER_USERNAME y DOCKER_TOKEN cuando lo suba al repo real
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push image to DockerHub
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/posts:${{steps.timestamp.outputs.tag}}